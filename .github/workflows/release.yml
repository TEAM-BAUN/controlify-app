# v* etiketi push'laninca 3 platform icin binary derler ve GitHub Release'e yukler.
# Kullanim: git tag v1.0.0 && git push origin v1.0.0
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: Controlify-windows.exe
          - os: macos-latest
            asset: Controlify-macos.zip
          - os: ubuntu-latest
            asset: Controlify-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Qt sistem kutuphaneleri (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1
      - run: uv sync
      - run: uv run pyinstaller controlify.spec --noconfirm
      - name: Ciktiyi adlandir
        shell: bash
        working-directory: dist
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            ditto -c -k --keepParent Controlify.app "${{ matrix.asset }}"
          else
            mv Controlify* "${{ matrix.asset }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: Controlify-*
